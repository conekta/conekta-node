name: Node.js CI

permissions:
  contents: read

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [ 18, 20, 22, 24, 26]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js for Mockoon CLI
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run Mockoon CLI
        uses: mockoon/cli-action@v3
        with:
          data-file: 'https://raw.githubusercontent.com/conekta/openapi/refs/heads/release/v2.3.0/mocks/conekta_api.json'
          port: 3000

      - name: Setup Node.js for test
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Execute test
        run: make test
        env:
          BASE_PATH: http://localhost:3000

